<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src https://dark-shape-c52d.luckymudulakar.workers.dev; img-src 'self' data:; font-src https://fonts.gstatic.com;">
  <title>LinkHunt</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#020408;
      --surface:#080f18;
      --surface2:#0d1a28;
      --border:#0f2a40;
      --accent:#00d4ff;
      --accent2:#ff3d8a;
      --accent3:#00ff9d;
      --accent4:#ffd700;
      --text:#e0f0ff;
      --muted:#3a6080;
      --card:#060e18;
    }

    html{scroll-behavior:smooth}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Space Grotesk',sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      cursor:none;
    }

    /* ── Custom cursor ── */
    #cursor{
      position:fixed;width:12px;height:12px;
      background:var(--accent);border-radius:50%;
      pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%);
      transition:transform 0.1s,background 0.2s,width 0.2s,height 0.2s;
      box-shadow:0 0 20px var(--accent),0 0 40px var(--accent);
      mix-blend-mode:screen;
    }
    #cursor-ring{
      position:fixed;width:36px;height:36px;
      border:1px solid rgba(0,212,255,0.4);
      border-radius:50%;pointer-events:none;z-index:9998;
      transform:translate(-50%,-50%);
      transition:transform 0.15s ease,width 0.2s,height 0.2s,border-color 0.2s;
    }
    a:hover~#cursor,button:hover~#cursor{width:20px;height:20px}

    /* ── Canvas background ── */
    #bgCanvas{
      position:fixed;inset:0;width:100%;height:100%;
      z-index:0;pointer-events:none;opacity:0.7;
    }

    /* ── Scan line overlay ── */
    body::after{
      content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(
        0deg,transparent,transparent 2px,
        rgba(0,212,255,0.015) 2px,rgba(0,212,255,0.015) 4px
      );
      pointer-events:none;z-index:1;
      animation:scanMove 8s linear infinite;
    }
    @keyframes scanMove{
      0%{background-position:0 0}
      100%{background-position:0 100px}
    }

    /* ── Wrapper ── */
    .wrapper{
      position:relative;z-index:2;
      max-width:900px;margin:0 auto;
      padding:70px 24px 120px;
    }

    /* ── Header ── */
    header{
      text-align:center;margin-bottom:64px;
      animation:bootUp 1s ease both;
    }

    .logo-wrap{
      position:relative;display:inline-block;
      margin-bottom:20px;
    }

    .logo-hex{
      width:72px;height:72px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;margin:0 auto 4px;
      animation:hexSpin 6s ease-in-out infinite;
      box-shadow:0 0 40px rgba(0,212,255,0.5),0 0 80px rgba(0,212,255,0.2);
    }
    @keyframes hexSpin{
      0%,100%{transform:rotate(0deg) scale(1)}
      25%{transform:rotate(5deg) scale(1.05)}
      75%{transform:rotate(-5deg) scale(1.05)}
    }

    .logo-ping{
      position:absolute;inset:0;margin:auto;
      width:72px;height:72px;
      clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      background:rgba(0,212,255,0.3);
      animation:ping 2s cubic-bezier(0,0,0.2,1) infinite;
    }
    @keyframes ping{
      0%{transform:scale(1);opacity:0.8}
      100%{transform:scale(2.2);opacity:0}
    }

    h1{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(2.8rem,7vw,5rem);
      font-weight:900;
      letter-spacing:0.08em;
      background:linear-gradient(90deg,var(--accent) 0%,#fff 40%,var(--accent2) 80%,var(--accent) 100%);
      background-size:200% auto;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:shimmer 3s linear infinite;
      text-transform:uppercase;
    }
    @keyframes shimmer{
      0%{background-position:0% center}
      100%{background-position:200% center}
    }

    .tagline{
      font-size:0.78rem;letter-spacing:0.35em;
      color:var(--muted);text-transform:uppercase;
      margin-top:10px;
      animation:fadeIn 1s ease 0.5s both;
    }

    .status-badges{
      display:flex;gap:12px;justify-content:center;
      flex-wrap:wrap;margin-top:20px;
      animation:fadeIn 1s ease 0.7s both;
    }
    .sbadge{
      display:inline-flex;align-items:center;gap:6px;
      padding:5px 14px;border-radius:99px;
      font-size:0.68rem;letter-spacing:0.1em;
      text-transform:uppercase;font-weight:600;
      border:1px solid;
    }
    .sbadge-cyan{color:var(--accent);border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.05)}
    .sbadge-pink{color:var(--accent2);border-color:rgba(255,61,138,0.3);background:rgba(255,61,138,0.05)}
    .sbadge-green{color:var(--accent3);border-color:rgba(0,255,157,0.3);background:rgba(0,255,157,0.05)}
    .sbadge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

    /* ── Card ── */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:36px;
      margin-bottom:28px;
      position:relative;overflow:hidden;
      animation:bootUp 0.8s ease 0.2s both;
    }
    .card::before{
      content:'';position:absolute;
      top:0;left:-100%;width:100%;height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
      animation:scanCard 3s linear infinite;
    }
    @keyframes scanCard{0%{left:-100%}100%{left:100%}}

    .card::after{
      content:'';position:absolute;
      inset:0;border-radius:16px;
      background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(0,212,255,0.04),transparent 60%);
      pointer-events:none;
    }

    /* Corner decorations */
    .corner{
      position:absolute;width:16px;height:16px;
      border-color:var(--accent);border-style:solid;
    }
    .corner-tl{top:10px;left:10px;border-width:2px 0 0 2px}
    .corner-tr{top:10px;right:10px;border-width:2px 2px 0 0}
    .corner-bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
    .corner-br{bottom:10px;right:10px;border-width:0 2px 2px 0}

    label{
      display:block;font-size:0.68rem;
      letter-spacing:0.2em;color:var(--accent);
      text-transform:uppercase;font-weight:600;
      margin-bottom:10px;margin-top:28px;
    }
    label:first-of-type{margin-top:0}
    label::before{content:'> ';opacity:0.6}

    .input-wrap{position:relative}
    .input-icon{
      position:absolute;left:14px;top:50%;
      transform:translateY(-50%);
      font-size:15px;opacity:0.4;pointer-events:none;
    }

    input[type="text"]{
      width:100%;
      background:rgba(0,212,255,0.03);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px 14px 14px 42px;
      color:var(--text);
      font-family:'Space Grotesk',sans-serif;
      font-size:0.88rem;
      transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
      outline:none;
    }
    input[type="text"]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(0,212,255,0.1),0 0 20px rgba(0,212,255,0.1);
      background:rgba(0,212,255,0.05);
    }
    input::placeholder{color:var(--muted)}

    .hint{font-size:0.7rem;color:var(--muted);margin-top:6px;letter-spacing:0.03em}
    .char-count{font-size:0.65rem;color:var(--muted);margin-top:3px;text-align:right;font-family:'Orbitron',sans-serif}
    .char-count.warn{color:var(--accent2)}

    /* ── Button ── */
    .btn{
      width:100%;margin-top:32px;padding:18px;
      background:transparent;
      border:1px solid var(--accent);
      border-radius:8px;
      color:var(--accent);
      font-family:'Orbitron',sans-serif;
      font-size:0.9rem;font-weight:700;
      letter-spacing:0.2em;text-transform:uppercase;
      cursor:none;
      position:relative;overflow:hidden;
      transition:color 0.3s,box-shadow 0.3s;
    }
    .btn::before{
      content:'';position:absolute;
      top:0;left:-100%;width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(0,212,255,0.15),transparent);
      transition:left 0.4s;
    }
    .btn:hover::before{left:100%}
    .btn:hover{
      color:#fff;
      box-shadow:0 0 30px rgba(0,212,255,0.4),inset 0 0 30px rgba(0,212,255,0.05);
    }
    .btn:disabled{opacity:0.3;cursor:not-allowed}
    .btn-inner{display:flex;align-items:center;justify-content:center;gap:12px}

    .spinner{
      width:16px;height:16px;
      border:2px solid rgba(0,212,255,0.2);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.6s linear infinite;
      display:none;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Status ── */
    .status{
      display:none;align-items:center;gap:12px;
      background:rgba(0,212,255,0.03);
      border:1px solid rgba(0,212,255,0.15);
      border-radius:8px;padding:12px 18px;
      font-size:0.75rem;color:var(--muted);
      margin-bottom:24px;letter-spacing:0.05em;
    }
    .status.visible{display:flex}
    .status-dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--accent);flex-shrink:0;
      animation:pulse 1s infinite;
    }

    /* ── Results ── */
    .results-header{
      display:flex;align-items:center;
      justify-content:space-between;
      margin-bottom:20px;flex-wrap:wrap;gap:12px;
    }
    .results-title{
      font-family:'Orbitron',sans-serif;
      font-weight:700;font-size:0.9rem;
      letter-spacing:0.15em;color:var(--accent);
      text-transform:uppercase;
    }
    .count-badge{
      background:rgba(0,255,157,0.08);
      border:1px solid rgba(0,255,157,0.3);
      color:var(--accent3);
      border-radius:4px;padding:3px 12px;
      font-size:0.7rem;font-family:'Orbitron',sans-serif;
    }

    /* ── AI Summary ── */
    .ai-summary{
      background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(255,61,138,0.05));
      border:1px solid rgba(0,212,255,0.2);
      border-radius:12px;padding:20px 24px;
      margin-bottom:20px;position:relative;
      overflow:hidden;
    }
    .ai-summary::before{
      content:'AI';
      position:absolute;right:16px;top:50%;
      transform:translateY(-50%);
      font-family:'Orbitron',sans-serif;
      font-size:4rem;font-weight:900;
      color:rgba(0,212,255,0.04);
      pointer-events:none;
      letter-spacing:0.1em;
    }
    .ai-label{
      font-size:0.65rem;letter-spacing:0.2em;
      color:var(--accent);text-transform:uppercase;
      font-weight:700;margin-bottom:10px;
      display:flex;align-items:center;gap:8px;
      font-family:'Orbitron',sans-serif;
    }
    .ai-label::before{content:'◈'}
    .ai-summary p{font-size:0.85rem;line-height:1.8;color:#90b8d0}

    /* ── Link cards ── */
    .link-list{display:flex;flex-direction:column;gap:8px}

    .link-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px 18px;
      display:flex;align-items:flex-start;gap:14px;
      text-decoration:none;color:inherit;
      transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s,background 0.2s;
      animation:slideIn 0.4s ease both;
      position:relative;overflow:hidden;
    }
    .link-card::before{
      content:'';position:absolute;
      left:0;top:0;bottom:0;width:2px;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      transform:scaleY(0);transform-origin:top;
      transition:transform 0.2s;
    }
    .link-card:hover::before{transform:scaleY(1)}
    .link-card:hover{
      border-color:rgba(0,212,255,0.3);
      transform:translateX(6px);
      background:rgba(0,212,255,0.03);
      box-shadow:0 4px 20px rgba(0,212,255,0.1);
    }
    @keyframes slideIn{
      from{opacity:0;transform:translateX(-20px)}
      to{opacity:1;transform:translateX(0)}
    }

    .link-num{
      font-family:'Orbitron',sans-serif;
      font-size:0.62rem;color:var(--muted);
      min-width:28px;padding-top:2px;
    }
    .link-content{flex:1;min-width:0}
    .link-url{
      font-size:0.8rem;color:var(--accent);
      word-break:break-all;line-height:1.5;
      font-family:'Space Grotesk',sans-serif;
    }
    .link-keyword-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
    .kw-tag{
      background:rgba(0,255,157,0.06);
      border:1px solid rgba(0,255,157,0.2);
      color:var(--accent3);border-radius:3px;
      padding:1px 8px;font-size:0.65rem;
      letter-spacing:0.08em;font-family:'Orbitron',sans-serif;
    }
    .link-arrow{
      color:var(--muted);font-size:12px;
      padding-top:3px;
      transition:color 0.2s,transform 0.2s;
    }
    .link-card:hover .link-arrow{color:var(--accent);transform:translateX(4px)}

    /* Stagger animation delays */
    .link-card:nth-child(1){animation-delay:0.03s}
    .link-card:nth-child(2){animation-delay:0.06s}
    .link-card:nth-child(3){animation-delay:0.09s}
    .link-card:nth-child(4){animation-delay:0.12s}
    .link-card:nth-child(5){animation-delay:0.15s}
    .link-card:nth-child(6){animation-delay:0.18s}
    .link-card:nth-child(7){animation-delay:0.21s}
    .link-card:nth-child(8){animation-delay:0.24s}

    /* ── Error ── */
    .error-box{
      background:rgba(255,61,138,0.05);
      border:1px solid rgba(255,61,138,0.3);
      border-radius:10px;padding:18px 22px;
      color:#ff90b8;font-size:0.85rem;line-height:1.7;
    }
    .error-box strong{display:block;margin-bottom:6px;color:var(--accent2);font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:0.1em}

    /* ── Empty ── */
    .empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
    .empty-state .big{font-size:3rem;margin-bottom:14px}
    .empty-state p{font-size:0.85rem;line-height:1.8}

    /* ── Footer ── */
    footer{
      text-align:center;margin-top:80px;
      color:var(--muted);font-size:0.65rem;
      letter-spacing:0.15em;text-transform:uppercase;
      font-family:'Orbitron',sans-serif;
      opacity:0.5;
    }
    footer span{color:var(--accent);opacity:1}

    /* ── Animations ── */
    @keyframes bootUp{
      0%{opacity:0;transform:translateY(30px) scale(0.97);filter:blur(4px)}
      100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
    }
    @keyframes fadeIn{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }

    @media(max-width:600px){
      .wrapper{padding:40px 16px 80px}
      .card{padding:24px 18px}
      h1{font-size:2.2rem}
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="bgCanvas"></canvas>

<div class="wrapper">
  <header>
    <div class="logo-wrap">
      <div class="logo-ping"></div>
      <div class="logo-hex">🔍</div>
    </div>
    <h1>LinkHunt</h1>
    <p class="tagline">// scan · extract · discover</p>
    <div class="status-badges">
      <span class="sbadge sbadge-cyan">AI Powered</span>
      <span class="sbadge sbadge-pink">Live Scanner</span>

    </div>
  </header>

  <div class="card" id="mainCard">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <label>Target URL</label>
    <div class="input-wrap">
      <span class="input-icon">🌐</span>
      <input type="text" id="urlInput" placeholder="https://example.com" maxlength="2000"
        oninput="updateCount('urlInput','urlCount',2000)"/>
    </div>
    <p class="hint">Enter the full URL of the website you want to scan</p>
    <div class="char-count" id="urlCount">0 / 2000</div>

    <label>Keywords</label>
    <div class="input-wrap">
      <span class="input-icon">⌖</span>
      <input type="text" id="keywordsInput" placeholder="python, tutorial, guide"
        maxlength="500" oninput="updateCount('keywordsInput','kwCount',500)"/>
    </div>
    <p class="hint">Separate multiple keywords with commas: word1, word2, word3</p>
    <div class="char-count" id="kwCount">0 / 500</div>

    <button class="btn" id="huntBtn" onclick="hunt()">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">[ INITIATE HUNT ]</span>
      </div>
    </button>
  </div>

  <div class="status" id="status">
    <div class="status-dot"></div>
    <span id="statusText">Initializing...</span>
  </div>

  <div id="results"></div>

  <footer>
    LinkHunt &nbsp;·&nbsp; <span>v2.0</span> &nbsp;·&nbsp;
    Zero budget &nbsp;·&nbsp; Maximum power
  </footer>
</div>

<script>
  const WORKER_URL = "https://dark-shape-c52d.luckymudulakar.workers.dev/";

  // ── Custom cursor ──
  const cur = document.getElementById("cursor");
  const ring = document.getElementById("cursor-ring");
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener("mousemove",e=>{
    mx=e.clientX;my=e.clientY;
    cur.style.left=mx+"px";cur.style.top=my+"px";
  });
  setInterval(()=>{
    rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;
    ring.style.left=rx+"px";ring.style.top=ry+"px";
  },16);

  // ── Card mouse glow ──
  document.getElementById("mainCard").addEventListener("mousemove",e=>{
    const r=e.currentTarget.getBoundingClientRect();
    e.currentTarget.style.setProperty("--mx",(e.clientX-r.left)+"px");
    e.currentTarget.style.setProperty("--my",(e.clientY-r.top)+"px");
  });

  // ── Canvas background (animated particles + grid) ──
  const canvas=document.getElementById("bgCanvas");
  const ctx=canvas.getContext("2d");
  let W,H,particles=[];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener("resize",()=>{resize();initParticles()});

  function initParticles(){
    particles=[];
    const count=Math.floor((W*H)/18000);
    for(let i=0;i<count;i++){
      particles.push({
        x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
        size:Math.random()*1.5+0.3,
        opacity:Math.random()*0.5+0.1,
        color:Math.random()>0.6?'0,212,255':Math.random()>0.5?'255,61,138':'0,255,157',
        pulse:Math.random()*Math.PI*2
      });
    }
  }
  initParticles();

  // Connection lines between nearby particles
  function drawConnections(){
    const maxDist=120;
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x;
        const dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<maxDist){
          const alpha=(1-dist/maxDist)*0.12;
          ctx.beginPath();
          ctx.strokeStyle=`rgba(0,212,255,${alpha})`;
          ctx.lineWidth=0.5;
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  let frame=0;
  function animate(){
    ctx.clearRect(0,0,W,H);
    frame++;

    // Draw grid
    ctx.strokeStyle='rgba(0,212,255,0.03)';
    ctx.lineWidth=1;
    const gridSize=60;
    for(let x=0;x<W;x+=gridSize){
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
    }
    for(let y=0;y<H;y+=gridSize){
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    }

    // Draw connections
    drawConnections();

    // Draw particles
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      p.pulse+=0.02;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      const pulseOpacity=p.opacity*(0.7+0.3*Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color},${pulseOpacity})`;
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*3,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color},${pulseOpacity*0.1})`;
      ctx.fill();
    });

    // Scanning horizontal line
    const scanY=(frame*0.4)%H;
    const gradient=ctx.createLinearGradient(0,scanY-30,0,scanY+30);
    gradient.addColorStop(0,'rgba(0,212,255,0)');
    gradient.addColorStop(0.5,'rgba(0,212,255,0.06)');
    gradient.addColorStop(1,'rgba(0,212,255,0)');
    ctx.fillStyle=gradient;
    ctx.fillRect(0,scanY-30,W,60);

    requestAnimationFrame(animate);
  }
  animate();

  // ── Security: sanitize ──
  function sanitize(str){
    const d=document.createElement("div");
    d.textContent=str;return d.innerHTML;
  }

  function updateCount(inputId,countId,max){
    const len=document.getElementById(inputId).value.length;
    const el=document.getElementById(countId);
    el.textContent=len+" / "+max;
    el.classList.toggle("warn",len>max*0.9);
  }

  async function hunt(){
    const url=document.getElementById("urlInput").value.trim();
    const keywords=document.getElementById("keywordsInput").value.trim();
    const resultsEl=document.getElementById("results");

    if(!url)return showError("Target URL required. Enter a website to scan.");
    if(!keywords)return showError("Keywords required. Enter at least one search term.");
    if(!url.startsWith("http"))return showError("URL must start with http:// or https://");
    try{new URL(url)}catch{return showError("Invalid URL format.")}

    setLoading(true);
    setStatus("Establishing connection...");
    resultsEl.innerHTML="";

    try{
      setStatus("Scanning target website for matching links...");
      const response=await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url,keywords})
      });
      const data=await response.json();
      if(!response.ok)throw new Error(data.error||"Backend error ("+response.status+")");
      setStatus("Processing results with AI...");
      renderResults(data,keywords);
    }catch(err){
      showError(sanitize(err.message)||"Connection failed. Please try again.");
    }finally{
      setLoading(false);hideStatus();
    }
  }

  function renderResults(data,keywords){
    const el=document.getElementById("results");
    const links=data.links||[];
    const summary=data.summary||"";

    if(links.length===0){
      el.innerHTML=`<div class="empty-state"><div class="big">📡</div><p>No links found matching your keywords.<br/>Try different keywords or a different website.</p></div>`;
      return;
    }

    const kwList=keywords.split(",").map(k=>k.trim().toLowerCase()).filter(Boolean);
    let html=`<div class="results-header">
      <span class="results-title">// Results</span>
      <span class="count-badge">${links.length} LINK${links.length!==1?"S":""} FOUND</span>
    </div>`;

    if(summary){
      html+=`<div class="ai-summary">
        <div class="ai-label">Neural Summary</div>
        <p>${sanitize(summary)}</p>
      </div>`;
    }

    html+=`<div class="link-list">`;
    links.forEach((link,i)=>{
      const safe=sanitize(link);
      const matched=kwList.filter(kw=>link.toLowerCase().includes(kw));
      const tags=matched.map(kw=>`<span class="kw-tag">${sanitize(kw)}</span>`).join("");
      html+=`<a class="link-card" href="${safe}" target="_blank" rel="noopener noreferrer">
        <span class="link-num">${String(i+1).padStart(3,"0")}</span>
        <div class="link-content">
          <div class="link-url">${safe}</div>
          ${tags?`<div class="link-keyword-tags">${tags}</div>`:""}
        </div>
        <span class="link-arrow">→</span>
      </a>`;
    });
    html+=`</div>`;
    el.innerHTML=html;
  }

  function showError(msg){
    document.getElementById("results").innerHTML=`<div class="error-box"><strong>⚠ System Error</strong>${msg}</div>`;
    setLoading(false);hideStatus();
  }

  function setLoading(on){
    document.getElementById("huntBtn").disabled=on;
    document.getElementById("spinner").style.display=on?"block":"none";
    document.getElementById("btnText").textContent=on?"[ SCANNING... ]":"[ INITIATE HUNT ]";
  }

  function setStatus(msg){
    document.getElementById("statusText").textContent=msg;
    document.getElementById("status").classList.add("visible");
  }

  function hideStatus(){
    document.getElementById("status").classList.remove("visible");
  }

  document.addEventListener("keydown",e=>{if(e.key==="Enter")hunt()});
</script>
</body>
</html>
